# Server configuration
server.port=8080

# Database Configuration (H2 In-Memory for local development)
spring.datasource.url=jdbc:h2:mem:ai_interview_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Disable schema.sql auto-execution (contains MySQL-specific DDL, Hibernate handles schema)
spring.sql.init.mode=never

# Multipart Uploads (for resume uploads, e.g., max 5MB PDF)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
# Secret key should be base64-encoded or a plain string of at least 32 characters
app.jwt.secret=9a4f2c5d8e7b6a5c3e2d1a0b9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1f0e
app.jwt.expiration-ms=86400000

# AI Services Configuration
# Set your keys here or set them via Environment Variables (recommended)
app.openai.api-key=YOUR_OPENAI_API_KEY
app.gemini.api-key=YOUR_GEMINI_API_KEY
app.ai.preferred-provider=openai
